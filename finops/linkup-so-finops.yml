description: >-
  FinOps view of Linkup spend. Linkup bills on a credits-based, per-request model:
  each Search, Fetch, and Research call consumes credits priced per call. Search
  runs about $0.005-$0.006 per call (varying by Fast / Standard / Deep depth),
  Fetch about $0.001-$0.005 per call, and async Research about $0.25-$2.50 per
  task. New accounts get free credits; Enterprise uses custom pricing.
notes: >-
  Per-request prices are ranges from the Linkup pricing page and vary by
  depth/mode; verify against https://www.linkup.so/pricing during reconciliation.
sources:
- https://www.linkup.so/pricing
- https://docs.linkup.so
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
